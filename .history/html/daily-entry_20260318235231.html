<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Daily Mood Entry</title>
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/daily-entry.css">
</head>
<body>

<header>
  <nav class="navbar">
    <div class="brand">
      <a href="index.html" class="logo">
        <span class="logo-drop" role="img" aria-label="MindTrace logo"></span>
        <span class="logo-text">MindTrace</span>
      </a>
    </div>
    <div class="nav-links">
      <a href="index.html">Home</a>
      <a href="habit-tracker.html">Habit Tracker</a>
      <a href="mood-journal.html" class="active">Mood Journal</a> <a href="resources.html">Resources</a>
      <a href="about.html">About</a>
    </div>
  </nav>
</header>

<main>
  <div class="page-header">
    <h1 class="tracking-in-expand">Daily Mood Entry</h1>
    <p>Reflect on your day and record how you're feeling</p>
  </div>

  <div class="entry-container">
    <div class="entry-form-section">
      
      <div class="form-group">
        <label for="mood-select" class="form-label">How are you feeling today?</label>
        <select id="mood-select" class="mood-select">
          <option>Happy</option>
          <option>Satisfied</option>
          <option>Exhausted</option>
          <option>Sad</option>
          <option>Anxious</option>
        </select>
      </div>

      <div class="form-group">
        <label for="mood-note" class="form-label">Optional Notes</label>
        <textarea id="mood-note" class="mood-textarea" rows="5" placeholder="Write a short reflection about your thoughts, feelings, or what happened today..."></textarea>
      </div>

      <div class="action-buttons">
        <a href="mood-journal.html" class="button-cancel" id="cancel-entry">Cancel</a>
        <button class="button" id="save-entry">Save Entry</button>
      </div>

    </div>
  </div>

  <script src="../js/daily-entry.js"></script>
</main>

<footer>
  <p>&copy; 2026 MindTrace. All rights reserved.</p>
</footer>

</body>
</html>
