<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>MindTrace – Habit Overview</title>
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/habit-overview.css">
</head>
<body>

<header>
  <nav class="navbar">
    <div class="brand">
      <a href="index.html" class="logo">
        <span class="logo-drop" role="img" aria-label="MindTrace logo"></span>
        <span class="logo-text">MindTrace</span>
      </a>
    </div>
    <div class="nav-links">
      <a href="index.html">Home</a>
      <a href="habit-tracker.html" class="active">Habit Tracker</a>
      <a href="mood-journal.html">Mood Journal</a>
      <a href="resources.html">Resources</a>
      <a href="about.html">About</a>
    </div>
  </nav>
</header>

<main>
  <div class="page-header">
    <h1 class="tracking-in-expand">Habit Overview</h1>
    <p>Your complete habit progress and statistics</p>
  </div>

  <div class="overview-container">
    <!-- Progress Overview -->
    <div class="section progress-section">
      <h2>Progress Overview</h2>
      <div id="habit-progress-list" class="habit-progress-list">
        <!-- dynamically populated -->
      </div>
    </div>

    <!-- Habit Insights -->
    <div class="section insights-section">
      <h2>💡 Habit Insights</h2>
      <div id="insight-cards" class="insight-cards">
        <!-- populated dynamically from completions -->
      </div>
    </div>

    <!-- Weekly Calendar View -->
    <div class="section calendar-section">
      <h2>📅 Weekly Overview</h2>
      <div id="week-grid" class="week-grid">
        <!-- dynamically rendered weekly view -->
      </div>
    </div>

    <!-- CTA Buttons -->
    <div class="action-buttons">
      <a class="button" href="habit-tracker.html">← Back to Habit Tracker</a>
      <a class="button secondary" href="add-habit.html">+ Add New Habit</a>
    </div>
  </div>
</main>

<footer>
  <p>&copy; 2026 MindTrace. All rights reserved.</p>
</footer>

</body>

<script src="../js/habit-overview.js"></script>
</html>
</html>
