<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Daily Mood Entry</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>

<header>
  <nav>
    <a href="index.html">Home</a>
    <a href="habit-tracker.html">Habit Tracker</a>
    <a href="mood-journal.html">Mood Journal</a>
    <a href="resources.html">Resources</a>
    <a href="about.html">About</a>
  </nav>
</header>

<main>
  <h1>Daily Mood Entry</h1>

  <div class="section">
    <label>How are you feeling today?</label><br><br>

    <select id="mood-select">
      <option>Happy</option>
      <option>Satisfied</option>
      <option>Exhausted</option>
      <option>Sad</option>
      <option>Anxious</option>
    </select>

    <br><br>

    <label>Optional Notes</label><br><br>

    <textarea id="mood-note" rows="4" cols="50" placeholder="Write a short reflection..."></textarea>

    <br><br>
    <button class="button" id="save-entry">Save Entry</button>

  </div>
  <script src="../js/daily-entry.js"></script>
</main>

<footer>

</body>
</html>
